  <body>
    <h1>Lofi Radio</h1>
    <main class="media-player">
      <div class="album-art"></div>
      <div class="media-container" id="media-container">
        <audio id="custom-lofi-player" loop>
          <source src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/erokia_ambient-wave-56-msfxp7-78.mp3" type="audio/mpeg" />
        </audio>
      <div class="song title">
        <p2>Erokia - Ambient Wave</p2>
      </div>

            <button class="button side" onclick="skip(-1)"><img src="https://img.icons8.com/ios-glyphs/30/rewind.png" width="20" height="25"/></button>
            <button class="button main" id="play-btn" onclick="togglePlay()"><img id="play-icon" src="https://img.icons8.com/?size=100&id=fKjdxWYsIQbi&format=png&color=000000" width="20" height="25"/></button>

      <input type="range" class="slider" id="progress" min="0" max="100" value="0">
    </main>

    <!-- Footer Section -->
    <footer>
      <p>&copy; 2024 Lofi Radio Site. All rights reserved.</p>
    </footer> 

    <script>
      const audio = document.getElementById('custom-lofi-player');
      const vCont = document.getElementById('media-container');
      const icon = document.getElementById('play-icon');
      const prog = document.getElementById('progress');
      
      let drag = false;

      // Pause the background animation initially so it only breathes when playing
      document.body.style.animationPlayState = 'paused';

      function togglePlay() {
        if (audio.paused) {
          audio.play();
          icon.src = "https://img.icons8.com/?size=100&id=AibrGCLNeCYz&format=png&color=000000";
          // Resume breathing animation when song is playing
          document.body.style.animationPlayState = 'running';
        } else {
          audio.pause();
          icon.src = "https://img.icons8.com/?size=100&id=fKjdxWYsIQbi&format=png&color=000000";
          // Pause breathing animation when song is paused
          document.body.style.animationPlayState = 'paused';
        }
      }

      audio.ontimeupdate = () => { if (!drag && audio.duration) prog.value = (audio.currentTime/audio.duration)*100; };
      prog.onmousedown = prog.ontouchstart = () => drag = true;
      prog.onmouseup = prog.ontouchend = () => drag = false;
      prog.oninput = () => audio.currentTime = (prog.value/100)*audio.duration;
    </script>
  </body>
